    <!-- 載入 React 核心庫 -->

</head>
<body class="bg-slate-50">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 內建圖示庫 ---
        const iconPaths = {
            Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
            UserPlus: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>',

            RotateCcw: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>',
            AlertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
            FileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>',
            Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
            Calculator: '<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/><path d="M8 18h.01"/><path d="M12 14h.01"/><path d="M12 18h.01"/>',

            Shuffle: '<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>',
            GitMerge: '<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/>',
            ShieldCheck: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
            Link: '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
            Lock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
            Unlock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>',
            Trash2: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
            Wand2: '<path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/>',
            MapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>'
        };

        const Icon = ({ name, className }) => {
            if (!iconPaths[name]) return null;
            return (
                <svg className={className} dangerouslySetInnerHTML={{__html: iconPaths[name]}} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            );
        };

        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-xl shadow-sm border border-gray-200 ${className}`}>{children}</div>;
        const CardHeader = ({ children, className = "" }) => <div className={`p-4 border-b border-gray-100 ${className}`}>{children}</div>;
        const CardTitle = ({ children, className = "" }) => <h3 className={`text-lg font-bold text-gray-800 ${className}`}>{children}</h3>;
        const CardContent = ({ children, className = "" }) => <div className={`p-4 ${className}`}>{children}</div>;

        const shuffleArray = (array) => {
          const newArr = [...array];
          for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
          }
          return newArr;
        };

        function SeatingPlanner() {
          const [viewMode, setViewMode] = useState('teacher'); 
          const [activeTab, setActiveTab] = useState('input');
          const [students, setStudents] = useState([]);
          // constraints structure: { s1, s2, targetGroup, type: 'ban' | 'pair' | 'assign' }
          const [constraints, setConstraints] = useState([]); 
          const [groupCount, setGroupCount] = useState(6);
          const [smallGroupId, setSmallGroupId] = useState(4); 
          const [algorithm, setAlgorithm] = useState('stratified'); 
          const [groups, setGroups] = useState([]);
          
          const [newStudent, setNewStudent] = useState({ name: '', score: '', gender: 'M' });
          const [bulkInput, setBulkInput] = useState('');
          const [constraintInput, setConstraintInput] = useState({ s1: '', s2: '', type: 'ban', targetGroup: 1 });
          
          const [isCalculating, setIsCalculating] = useState(false);
          const [lastPlaceRuleApplied, setLastPlaceRuleApplied] = useState(false);
          const [fakeInputList, setFakeInputList] = useState('');

          const addStudent = () => {
            if (!newStudent.name || !newStudent.score) return;
            const id = students.length > 0 ? Math.max(...students.map(s => s.id)) + 1 : 1;
            setStudents([...students, { ...newStudent, id, score: Number(newStudent.score) }].sort((a,b)=>a.score-b.score));
            setNewStudent({ name: '', score: '', gender: 'M' });
          };

          const deleteStudent = (id) => {
            setStudents(students.filter(s => s.id !== id));
            setConstraints(constraints.filter(c => c.s1 !== id && c.s2 !== id));
          };

          const handleBulkImport = () => {
            const lines = bulkInput.trim().split('\n');
            const parsedStudents = [];
            let currentId = students.length > 0 ? Math.max(...students.map(s => s.id)) + 1 : 1;

            lines.forEach(line => {
              const parts = line.replace(/,/g, ' ').split(/\s+/).filter(p => p);
              if (parts.length >= 2) {
                const name = parts[0];
                const score = Number(parts[1]);
                let gender = 'M';
                if (parts.length > 2) {
                   const gInput = parts[2].toUpperCase();
                   if (['F', '女', 'GIRL'].includes(gInput)) gender = 'F';
                }
                if (!isNaN(score)) {
                  parsedStudents.push({ id: currentId++, name, score, gender });
                }
              }
            });

            if (parsedStudents.length > 0) {
              setStudents([...students, ...parsedStudents].sort((a,b)=>a.score-b.score));
              setBulkInput('');
              alert(`成功匯入 ${parsedStudents.length} 位學生`);
            } else {
              alert('格式錯誤。請使用：姓名 排名 性別');
            }
          };

          const addConstraint = () => {
            const s1 = Number(constraintInput.s1);
            
            // 處理「指定組別」規則
            if (constraintInput.type === 'assign') {
               const tg = Number(constraintInput.targetGroup);
               if (!s1 || !tg) return;
               
               // 移除該學生舊的指定規則，避免重複衝突
               const filteredC = constraints.filter(c => !(c.type === 'assign' && c.s1 === s1));
               setConstraints([...filteredC, { s1, targetGroup: tg, type: 'assign' }]);
               setConstraintInput({ ...constraintInput, s1: '' });
               return;
            }

            // 處理「排斥/綁定」規則
            const s2 = Number(constraintInput.s2);
            if (!s1 || !s2 || s1 === s2) return;
            
            const exists = constraints.some(c => c.type !== 'assign' && ((c.s1 === s1 && c.s2 === s2) || (c.s1 === s2 && c.s2 === s1)));
            if (exists) {
              alert("這兩位學生已經有互動規則了！");
              return;
            }
            
            setConstraints([...constraints, { s1, s2, type: constraintInput.type }]);
            setConstraintInput({ ...constraintInput, s1: '', s2: '' });
          };

          const removeConstraint = (index) => {
            const newC = [...constraints];
            newC.splice(index, 1);
            setConstraints(newC);
          };

          const setOptimalGroupCount = () => {
            if (students.length === 0) return;
            const optimal = Math.ceil(students.length / 4);
            setGroupCount(optimal);
          };

          const handleSecretToggle = () => {
             if (viewMode === 'teacher') {
                setActiveTab('result'); 
                setViewMode('student');
             } else {
                setViewMode('teacher');
             }
          };

          const clearGroupsAndFakeInput = () => {
            setGroups([]);
            setFakeInputList('');
            setLastPlaceRuleApplied(false);
          };
          
          const clearGroups = () => {
            setGroups([]);
            setLastPlaceRuleApplied(false);
          };

          // --- 核心演算法 ---
          const generateGroups = () => {
            if (students.length === 0) {
              alert(viewMode === 'teacher' ? "請先在輸入資料區填寫學生資料！" : "系統錯誤：請聯繫老師。");
              return;
            }
            
            setIsCalculating(true);
            setLastPlaceRuleApplied(false);
            
            setTimeout(() => {
              // 1. 初始化空組別
              let tempGroups = Array.from({ length: groupCount }, (_, i) => ({
                id: i + 1,
                members: [],
                stats: { scoreSum: 0, mCount: 0, fCount: 0 }
              }));

              // 2. 預先安插「指定組別」的學生
              const assignedIds = new Set();
              constraints.forEach(c => {
                 if (c.type === 'assign') {
                    const student = students.find(s => s.id === c.s1);
                    if (student && c.targetGroup >= 1 && c.targetGroup <= groupCount) {
                       tempGroups[c.targetGroup - 1].members.push(student);
                       assignedIds.add(student.id);
                    }
                 }
              });

              // 3. 計算目標容量 (Target Capacities)
              const targetCapacities = {};
              const baseCap = Math.floor(students.length / groupCount);
              let remainder = students.length % groupCount;
              
              for(let i=1; i<=groupCount; i++) targetCapacities[i] = baseCap;
              
              let groupIds = Array.from({length: groupCount}, (_, i) => i + 1);
              if (smallGroupId > 0 && smallGroupId <= groupCount) {
                 groupIds = groupIds.filter(id => id !== smallGroupId);
                 groupIds.push(smallGroupId); 
              }
              
              for(let id of groupIds) {
                 if (remainder > 0) {
                    targetCapacities[id]++;
                    remainder--;
                 }
              }

              // 4. 準備尚未被指定的學生
              let boys = students.filter(s => s.gender === 'M' && !assignedIds.has(s.id)).sort((a, b) => a.score - b.score);
              let girls = students.filter(s => s.gender === 'F' && !assignedIds.has(s.id)).sort((a, b) => a.score - b.score);

              // 5. 執行分配演算法
              if (algorithm === 'snake') {
                boys.forEach((student) => {
                  tempGroups.sort((a, b) => {
                     const deficitA = a.members.length - targetCapacities[a.id];
                     const deficitB = b.members.length - targetCapacities[b.id];
                     if (deficitA !== deficitB) return deficitA - deficitB;
                     // 稍微隨機或按順序
                     return a.id - b.id;
                  });
                  tempGroups[0].members.push(student);
                });
                girls.forEach(girl => {
                  tempGroups.sort((a, b) => {
                     const deficitA = a.members.length - targetCapacities[a.id];
                     const deficitB = b.members.length - targetCapacities[b.id];
                     if (deficitA !== deficitB) return deficitA - deficitB; 
                     const sumA = a.members.reduce((acc, m) => acc + m.score, 0);
                     const sumB = b.members.reduce((acc, m) => acc + m.score, 0);
                     return sumB - sumA; 
                  });
                  tempGroups[0].members.push(girl);
                });
                tempGroups.sort((a, b) => a.id - b.id);
              } else {
                const distributeStratified = (list) => {
                  const layerCount = Math.ceil(list.length / groupCount);
                  for (let i = 0; i < layerCount; i++) {
                    const start = i * groupCount;
                    const end = Math.min(start + groupCount, list.length);
                    let stratum = list.slice(start, end);
                    stratum = shuffleArray(stratum);
                    stratum.forEach((student) => {
                       tempGroups.sort((a, b) => {
                         const deficitA = a.members.length - targetCapacities[a.id];
                         const deficitB = b.members.length - targetCapacities[b.id];
                         return deficitA - deficitB;
                       });
                       tempGroups[0].members.push(student);
                    });
                  }
                };
                distributeStratified(boys);
                distributeStratified(girls);
                tempGroups.sort((a, b) => a.id - b.id);
              }

              // --- 守門員機制 (保護最後一名男生) ---
              let ruleApplied = false;
              const allBoys = tempGroups.flatMap(g => g.members).filter(m => m.gender === 'M');
              if (allBoys.length > 0) {
                const lastPlaceBoy = allBoys.reduce((prev, curr) => (prev.score > curr.score) ? prev : curr);
                // 檢查他是否已被老師鎖定在某組
                const isAssigned = constraints.some(c => c.type === 'assign' && c.s1 === lastPlaceBoy.id);
                
                if (!isAssigned) {
                   const currentGroup = tempGroups.find(g => g.members.some(m => m.id === lastPlaceBoy.id));
                   if (currentGroup) {
                      const boyCount = currentGroup.members.filter(m => m.gender === 'M').length;
                      if (boyCount > 2) {
                        const targetGroup = tempGroups.find(g => 
                          g.id !== currentGroup.id && 
                          g.members.filter(m => m.gender === 'M').length <= 2 &&
                          // 確保目標組的男生沒有被老師鎖定
                          g.members.some(m => m.gender === 'M' && !constraints.some(c => c.type === 'assign' && c.s1 === m.id)) 
                        );
                        if (targetGroup) {
                          const targetBoy = targetGroup.members.find(m => m.gender === 'M' && !constraints.some(c => c.type === 'assign' && c.s1 === m.id));
                          if (targetBoy) {
                              currentGroup.members = currentGroup.members.filter(m => m.id !== lastPlaceBoy.id);
                              targetGroup.members = targetGroup.members.filter(m => m.id !== targetBoy.id);
                              currentGroup.members.push(targetBoy);
                              targetGroup.members.push(lastPlaceBoy);
                              ruleApplied = true;
                          }
                        }
                      }
                   }
                }
              }
              setLastPlaceRuleApplied(ruleApplied);

              // 輔助函式：檢查某人是否可以被交換走
              const canMove = (studentId, proposedGroupIdx) => {
                 const assignRule = constraints.find(c => c.type === 'assign' && c.s1 === studentId);
                 if (assignRule) return (assignRule.targetGroup - 1) === proposedGroupIdx;
                 return true; // 沒被綁定，可以自由移動
              };

              // 6. 衝突處理 (Ban & Pair)
              let iteration = 0;
              let hasIssue = true;
              while (hasIssue && iteration < 300) {
                hasIssue = false;
                iteration++;
                
                const memberMap = {};
                tempGroups.forEach((g, gIdx) => g.members.forEach(m => memberMap[m.id] = gIdx));

                for (const constraint of constraints) {
                  if (constraint.type === 'assign') continue; // Assign已在前面處理完畢

                  const g1 = memberMap[constraint.s1];
                  const g2 = memberMap[constraint.s2];
                  if (g1 === undefined || g2 === undefined) continue;

                  // 處理 BAN (不能同組卻在一起)
                  if (constraint.type === 'ban' && g1 === g2) {
                    hasIssue = true;
                    const groupIndex = g1;
                    const studentA = tempGroups[groupIndex].members.find(m => m.id === constraint.s1);
                    let swapped = false;
                    const targetIndices = shuffleArray(Array.from({length: groupCount}, (_, i) => i).filter(i => i !== groupIndex));

                    for (const targetGIdx of targetIndices) {
                      const candidates = tempGroups[targetGIdx].members.filter(m => m.gender === studentA.gender);
                      for (const candidate of candidates) {
                         // 檢查雙方是否都被允許移動
                         if (canMove(studentA.id, targetGIdx) && canMove(candidate.id, groupIndex)) {
                            tempGroups[groupIndex].members = tempGroups[groupIndex].members.filter(m => m.id !== studentA.id);
                            tempGroups[targetGIdx].members = tempGroups[targetGIdx].members.filter(m => m.id !== candidate.id);
                            tempGroups[targetGIdx].members.push(studentA);
                            tempGroups[groupIndex].members.push(candidate);
                            swapped = true;
                            break;
                         }
                      }
                      if (swapped) break;
                    }
                  }

                  // 處理 PAIR (要同組卻不在一起)
                  if (constraint.type === 'pair' && g1 !== g2) {
                    hasIssue = true;
                    const groupIndex1 = g1;
                    const groupIndex2 = g2;
                    const student1 = tempGroups[groupIndex1].members.find(m => m.id === constraint.s1);
                    const student2 = tempGroups[groupIndex2].members.find(m => m.id === constraint.s2);
                    
                    // 嘗試把 S2 搬到 G1 (需要 G1 某人換去 G2)
                    const swapCandidate1 = tempGroups[groupIndex1].members.find(m => 
                      m.id !== student1.id && m.gender === student2.gender && canMove(m.id, groupIndex2)
                    );
                    
                    if (swapCandidate1 && canMove(student2.id, groupIndex1)) {
                       tempGroups[groupIndex1].members = tempGroups[groupIndex1].members.filter(m => m.id !== swapCandidate1.id);
                       tempGroups[groupIndex2].members = tempGroups[groupIndex2].members.filter(m => m.id !== student2.id);
                       tempGroups[groupIndex1].members.push(student2);
                       tempGroups[groupIndex2].members.push(swapCandidate1);
                       break; 
                    }
                    
                    // 失敗的話，嘗試反過來：把 S1 搬到 G2
                    const swapCandidate2 = tempGroups[groupIndex2].members.find(m => 
                      m.id !== student2.id && m.gender === student1.gender && canMove(m.id, groupIndex1)
                    );

                    if (swapCandidate2 && canMove(student1.id, groupIndex2)) {
                       tempGroups[groupIndex2].members = tempGroups[groupIndex2].members.filter(m => m.id !== swapCandidate2.id);
                       tempGroups[groupIndex1].members = tempGroups[groupIndex1].members.filter(m => m.id !== student1.id);
                       tempGroups[groupIndex2].members.push(student1);
                       tempGroups[groupIndex1].members.push(swapCandidate2);
                       break; 
                    }
                  }
                }
              }

              tempGroups.forEach(g => {
                g.members.sort((a, b) => a.score - b.score);
                const scoreSum = g.members.reduce((acc, m) => acc + m.score, 0);
                g.stats = {
                  avg: g.members.length ? (scoreSum / g.members.length).toFixed(1) : 0,
                  mCount: g.members.filter(m => m.gender === 'M').length,
                  fCount: g.members.filter(m => m.gender === 'F').length,
                  hasConflict: false
                };
                g.members.forEach(m => {
                   constraints.forEach(c => {
                     if (c.type === 'ban') {
                        const enemyId = c.s1 === m.id ? c.s2 : (c.s2 === m.id ? c.s1 : null);
                        if (enemyId && g.members.find(o => o.id === enemyId)) g.stats.hasConflict = true;
                     }
                   });
                });
              });

              setGroups(tempGroups);
              setIsCalculating(false);
              if (viewMode === 'teacher') setActiveTab('result');
            }, 1000); 
          };

          const getStudentName = (id) => students.find(s => s.id === id)?.name || '未知';

          // --- 渲染畫面 ---
          const renderHeader = () => (
            <div className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6 transition-all">
              <div className="flex items-center gap-3">
                <div 
                  onDoubleClick={handleSecretToggle}
                  title={viewMode === 'teacher' ? "雙擊切換至展示模式" : ""}
                  className={`p-3 rounded-xl text-white transition-all cursor-pointer select-none transform hover:scale-105 ${viewMode === 'teacher' ? 'bg-indigo-600 shadow-md' : 'bg-gradient-to-br from-rose-400 to-orange-500 shadow-lg'}`}
                >
                  <Icon name="Wand2" className="w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">
                    {viewMode === 'teacher' ? '智慧分組後台 (設定)' : '隨機分組小幫手'}
                  </h1>
                  {viewMode === 'teacher' && (
                    <p className="text-slate-500 mt-1 font-medium text-sm">
                      🔒 提示：在左側魔杖圖示上「雙擊」即可無痕切換至展示模式
                    </p>
                  )}
                </div>
              </div>
              
              {viewMode === 'teacher' && (
                <div className="flex items-center gap-4">
                  <div className="flex bg-white p-1.5 rounded-xl shadow-sm border border-slate-200">
                    {[
                      { id: 'input', label: '1. 名單' },
                      { id: 'constraints', label: '2. 條件' },
                      { id: 'result', label: '3. 結果' }
                    ].map(tab => (
                      <button 
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${
                          activeTab === tab.id 
                            ? 'bg-indigo-600 text-white shadow-md' 
                            : 'text-slate-500 hover:bg-slate-50'
                        }`}
                      >
                        {tab.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );

          return (
            <div className={`min-h-screen p-4 md:p-8 font-sans transition-colors duration-500 ${viewMode === 'teacher' ? 'bg-slate-50 text-slate-900' : 'bg-amber-50 text-slate-800'}`}>
              <div className="max-w-6xl mx-auto">
                
                {renderHeader()}

                {/* --- STUDENT VIEW --- */}
                {viewMode === 'student' && (
                   <div className="animate-in fade-in zoom-in duration-500">
                     {groups.length === 0 ? (
                        <div className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-amber-100">
                           <h2 className="text-2xl font-black text-slate-800 mb-2 text-center">步驟一：載入名單</h2>
                           <p className="text-slate-500 mb-6 text-center text-sm">請將今日上課學生的姓名貼入下方文字框中</p>
                           <textarea 
                              className="w-full h-64 p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:ring-4 focus:ring-rose-100 focus:border-rose-400 outline-none text-lg resize-none mb-6 shadow-inner hide-scrollbar transition-all"
                              placeholder="請在此貼上名單...&#10;王大明&#10;陳小花&#10;林阿強"
                              value={fakeInputList}
                              onChange={(e) => setFakeInputList(e.target.value)}
                           ></textarea>
                           <div className="flex justify-center">
                              <button 
                                onClick={generateGroups}
                                disabled={isCalculating}
                                className="px-10 py-4 bg-gradient-to-r from-rose-500 to-orange-500 text-white text-xl font-bold rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 active:scale-95 transition-all flex items-center gap-3 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none"
                              >
                                {isCalculating ? (
                                  <><Icon name="RotateCcw" className="animate-spin w-6 h-6"/> 正在洗牌與分配...</>
                                ) : (
                                  <><Icon name="Shuffle" className="w-6 h-6"/> 開始隨機分組</>
                                )}
                              </button>
                           </div>
                        </div>
                     ) : (
                        <div className="space-y-8">
                           <div className="flex justify-center gap-4">
                              <button 
                                onClick={generateGroups}
                                className="px-6 py-2.5 bg-white border-2 border-rose-200 text-rose-600 rounded-full font-bold shadow-sm hover:bg-rose-50 active:scale-95 transition-all flex items-center gap-2"
                              >
                                <Icon name="RotateCcw" className={`w-4 h-4 ${isCalculating ? 'animate-spin' : ''}`}/> 
                                重新洗牌
                              </button>
                              <button 
                                onClick={clearGroupsAndFakeInput}
                                className="px-6 py-2.5 bg-amber-200/50 border-2 border-amber-200 text-amber-700 rounded-full font-bold shadow-sm hover:bg-amber-200 active:scale-95 transition-all flex items-center gap-2"
                              >
                                <Icon name="Users" className="w-4 h-4"/> 
                                重新貼上名單
                              </button>
                           </div>
                           
                           <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                              {groups.map((group) => (
                                <div key={group.id} className="bg-white rounded-2xl shadow-lg border-2 border-amber-100 overflow-hidden transform hover:-translate-y-1 transition-transform duration-300">
                                   <div className="bg-gradient-to-r from-amber-100 to-orange-50 p-4 flex justify-between items-center border-b border-amber-100">
                                      <span className="text-xl font-black text-amber-900">第 {group.id} 組</span>
                                      <div className="flex gap-1">
                                        {Array.from({length: group.members.length}).map((_, i) => (
                                          <div key={i} className="w-2 h-2 rounded-full bg-amber-400"></div>
                                        ))}
                                      </div>
                                   </div>
                                   <div className="p-6">
                                      <div className="grid grid-cols-2 gap-4">
                                        {group.members.map(m => (
                                           <div key={m.id} className="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 shadow-sm">
                                              <div className={`w-2.5 h-2.5 rounded-full mb-2 ${m.gender === 'M' ? 'bg-blue-400' : 'bg-pink-400'}`}></div>
                                              <span className="font-bold text-lg text-slate-700">{m.name}</span>
                                           </div>
                                        ))}
                                      </div>
                                   </div>
                                </div>
                              ))}
                           </div>
                        </div>
                     )}
                   </div>
                )}

                {/* --- TEACHER VIEW --- */}
                {viewMode === 'teacher' && activeTab === 'input' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                    <Card className="lg:col-span-1 h-fit">
                      <CardHeader className="bg-slate-50/50">
                        <CardTitle className="flex items-center gap-2">
                          <Icon name="UserPlus" className="w-5 h-5 text-indigo-600"/> 新增真實資料
                        </CardTitle>
                      </CardHeader>
                      <CardContent className="space-y-4">
                        <div className="space-y-2">
                           <input type="text" placeholder="姓名" value={newStudent.name} onChange={e => setNewStudent({...newStudent, name: e.target.value})} className="w-full p-2 border rounded"/>
                           <div className="flex gap-2">
                             <input type="number" placeholder="排名" value={newStudent.score} onChange={e => setNewStudent({...newStudent, score: e.target.value})} className="w-1/2 p-2 border rounded"/>
                             <select value={newStudent.gender} onChange={e => setNewStudent({...newStudent, gender: e.target.value})} className="w-1/2 p-2 border rounded">
                                <option value="M">男生</option><option value="F">女生</option>
                             </select>
                           </div>
                           <button onClick={addStudent} className="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">加入</button>
                        </div>
                        <hr/>
                        <div>
                           <label className="text-xs font-bold text-slate-500 mb-1 block">批量貼上 (姓名 排名 性別)</label>
                           <textarea value={bulkInput} onChange={e => setBulkInput(e.target.value)} className="w-full p-2 border rounded h-24 text-sm" placeholder="王小明 1 男"></textarea>
                           <button onClick={handleBulkImport} className="w-full mt-2 bg-slate-100 py-1.5 rounded text-sm hover:bg-slate-200">批量匯入</button>
                        </div>
                      </CardContent>
                    </Card>

                    <Card className="lg:col-span-2">
                      <CardHeader className="flex justify-between items-center bg-slate-50/50">
                         <CardTitle>真實名單 ({students.length})</CardTitle>
                         <div className="text-xs space-x-2">
                            <span className="text-blue-600">男: {students.filter(s=>s.gender==='M').length}</span>
                            <span className="text-pink-600">女: {students.filter(s=>s.gender==='F').length}</span>
                         </div>
                      </CardHeader>
                      <div className="overflow-auto max-h-[500px]">
                         <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 sticky top-0">
                               <tr><th className="p-3">排名</th><th className="p-3">姓名</th><th className="p-3">性別</th><th className="p-3 text-right">動作</th></tr>
                            </thead>
                            <tbody className="divide-y">
                               {students.map(s => (
                                  <tr key={s.id} className="hover:bg-slate-50">
                                     <td className="p-3">#{s.score}</td>
                                     <td className="p-3 font-bold">{s.name}</td>
                                     <td className="p-3">{s.gender==='M'?'男':'女'}</td>
                                     <td className="p-3 text-right"><button onClick={()=>deleteStudent(s.id)} className="text-red-400 hover:text-red-600">刪除</button></td>
                                  </tr>
                               ))}
                            </tbody>
                         </table>
                      </div>
                    </Card>
                  </div>
                )}

                {viewMode === 'teacher' && activeTab === 'constraints' && (
                   <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                      <Card className="lg:col-span-1 h-fit">
                        <CardHeader className="bg-slate-50/50"><CardTitle>設定規則</CardTitle></CardHeader>
                        <CardContent className="space-y-6">
                           <div className="space-y-4">
                              <div>
                                 <label className="text-xs font-bold text-slate-500 block mb-1">分組策略</label>
                                 <div className="flex gap-2">
                                    <button onClick={()=>setAlgorithm('snake')} className={`flex-1 py-1 text-xs border rounded ${algorithm==='snake'?'bg-indigo-50 border-indigo-500 text-indigo-700':'bg-white'}`}>S型分配</button>
                                    <button onClick={()=>setAlgorithm('stratified')} className={`flex-1 py-1 text-xs border rounded ${algorithm==='stratified'?'bg-green-50 border-green-500 text-green-700':'bg-white'}`}>分層隨機</button>
                                 </div>
                              </div>
                              <div>
                                 <div className="flex justify-between items-center mb-1">
                                    <label className="text-xs font-bold text-slate-500">總組數: {groupCount}</label>
                                    <button onClick={setOptimalGroupCount} className="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded">設為4人一組</button>
                                 </div>
                                 <input type="range" min="2" max={Math.max(2, Math.floor(students.length/2))} value={groupCount} onChange={e=>setGroupCount(Number(e.target.value))} className="w-full"/>
                              </div>
                              <div className="mt-2 bg-indigo-50/50 p-3 rounded-lg border border-indigo-100">
                                 <label className="text-xs font-bold text-indigo-700 block mb-1">指定人數較少的組別</label>
                                 <select 
                                    value={smallGroupId} 
                                    onChange={e => setSmallGroupId(Number(e.target.value))}
                                    className="w-full p-2 border border-indigo-200 rounded text-sm bg-white focus:ring-2 focus:ring-indigo-300 outline-none"
                                 >
                                    <option value={0}>自動分配 (預設)</option>
                                    {Array.from({length: groupCount}).map((_, i) => (
                                       <option key={i+1} value={i+1}>指定 第 {i+1} 組</option>
                                    ))}
                                 </select>
                              </div>
                           </div>
                           <hr/>
                           <div className="space-y-2">
                              <label className="text-xs font-bold text-slate-500 block">新增排斥/綁定/指定組別</label>
                              <div className="flex gap-2 mb-2">
                                 <button onClick={()=>setConstraintInput({...constraintInput, type: 'ban'})} className={`flex-1 py-1.5 rounded text-xs font-bold flex flex-col items-center justify-center gap-1 ${constraintInput.type==='ban' ? 'bg-red-100 text-red-600 ring-2 ring-red-400' : 'bg-slate-50 text-slate-400'}`}>
                                    <Icon name="Ban" className="w-4 h-4"/> 不要同組
                                 </button>
                                 <button onClick={()=>setConstraintInput({...constraintInput, type: 'pair'})} className={`flex-1 py-1.5 rounded text-xs font-bold flex flex-col items-center justify-center gap-1 ${constraintInput.type==='pair' ? 'bg-blue-100 text-blue-600 ring-2 ring-blue-400' : 'bg-slate-50 text-slate-400'}`}>
                                    <Icon name="Link" className="w-4 h-4"/> 一定同組
                                 </button>
                                 <button onClick={()=>setConstraintInput({...constraintInput, type: 'assign'})} className={`flex-1 py-1.5 rounded text-xs font-bold flex flex-col items-center justify-center gap-1 ${constraintInput.type==='assign' ? 'bg-purple-100 text-purple-600 ring-2 ring-purple-400' : 'bg-slate-50 text-slate-400'}`}>
                                    <Icon name="MapPin" className="w-4 h-4"/> 指定組別
                                 </button>
                              </div>
                              <select value={constraintInput.s1} onChange={e=>setConstraintInput({...constraintInput, s1: e.target.value})} className="w-full p-2 border rounded text-sm mb-2">
                                 <option value="">選擇學生 A</option>
                                 {students.map(s=><option key={s.id} value={s.id}>{s.name} (#{s.score})</option>)}
                              </select>
                              
                              {constraintInput.type === 'assign' ? (
                                 <select value={constraintInput.targetGroup} onChange={e=>setConstraintInput({...constraintInput, targetGroup: e.target.value})} className="w-full p-2 border rounded text-sm bg-purple-50 outline-none focus:ring-2 focus:ring-purple-300">
                                    {Array.from({length: groupCount}).map((_, i) => (
                                       <option key={i+1} value={i+1}>鎖定於 👉 第 {i+1} 組</option>
                                    ))}
                                 </select>
                              ) : (
                                 <select value={constraintInput.s2} onChange={e=>setConstraintInput({...constraintInput, s2: e.target.value})} className="w-full p-2 border rounded text-sm">
                                    <option value="">選擇學生 B</option>
                                    {students.filter(s=>String(s.id)!==constraintInput.s1).map(s=><option key={s.id} value={s.id}>{s.name} (#{s.score})</option>)}
                                 </select>
                              )}
                              
                              <button onClick={addConstraint} className="w-full mt-2 bg-slate-800 text-white py-2 rounded hover:bg-black">新增規則</button>
                           </div>
                        </CardContent>
                      </Card>

                      <Card className="lg:col-span-2">
                         <CardHeader className="bg-slate-50/50"><CardTitle>規則清單 ({constraints.length})</CardTitle></CardHeader>
                         <CardContent>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                               {constraints.map((c, idx) => (
                                  <div key={idx} className={`flex items-center justify-between p-3 border rounded-lg ${c.type==='ban'?'bg-red-50 border-red-100': c.type==='pair' ? 'bg-blue-50 border-blue-100' : 'bg-purple-50 border-purple-100'}`}>
                                     
                                     {c.type === 'assign' ? (
                                        <div className="flex items-center gap-2 text-sm font-bold text-purple-800">
                                           <span>{getStudentName(c.s1)}</span>
                                           <Icon name="MapPin" className="w-4 h-4 text-purple-400"/>
                                           <span>第 {c.targetGroup} 組</span>
                                        </div>
                                     ) : (
                                        <div className="flex items-center gap-2 text-sm font-bold">
                                           <span>{getStudentName(c.s1)}</span>
                                           {c.type === 'ban' ? <Icon name="Ban" className="w-4 h-4 text-red-400"/> : <Icon name="Link" className="w-4 h-4 text-blue-400"/>}
                                           <span>{getStudentName(c.s2)}</span>
                                        </div>
                                     )}
                                     
                                     <button onClick={()=>removeConstraint(idx)} className="text-slate-400 hover:text-slate-600">×</button>
                                  </div>
                               ))}
                               {constraints.length === 0 && <div className="col-span-2 text-center text-slate-400 py-8">暫無設定</div>}
                            </div>
                         </CardContent>
                      </Card>
                   </div>
                )}

                {viewMode === 'teacher' && activeTab === 'result' && (
                   <div className="animate-in fade-in slide-in-from-bottom-4 duration-300">
                      <div className="flex justify-between items-center mb-6">
                         <div className="flex gap-2">
                            <button onClick={generateGroups} className="px-4 py-2 bg-indigo-600 text-white rounded font-bold shadow hover:bg-indigo-700 flex items-center gap-2">
                               <Icon name="RotateCcw" className={`w-4 h-4 ${isCalculating?'animate-spin':''}`}/> 運算
                            </button>
                            <button onClick={clearGroups} className="px-4 py-2 bg-white border border-slate-300 text-slate-600 rounded font-bold hover:bg-slate-50 flex items-center gap-2">
                               <Icon name="Trash2" className="w-4 h-4"/> 清除
                            </button>
                            {lastPlaceRuleApplied && <span className="bg-emerald-100 text-emerald-700 px-3 py-2 rounded text-sm font-bold flex items-center gap-1"><Icon name="ShieldCheck" className="w-4 h-4"/> 守門員機制</span>}
                            {groups.some(g=>g.stats.hasConflict) && <span className="bg-red-100 text-red-700 px-3 py-2 rounded text-sm font-bold flex items-center gap-1"><Icon name="AlertCircle" className="w-4 h-4"/> 衝突</span>}
                         </div>
                         <div className="text-sm text-slate-500">平均排名: {(groups.reduce((a,c)=>a+parseFloat(c.stats.avg),0)/Math.max(1, groups.length)).toFixed(1)}</div>
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                         {groups.map((group) => (
                            <div key={group.id} className={`bg-white rounded-xl border shadow-sm ${group.stats.hasConflict ? 'border-red-300 ring-2 ring-red-100' : 'border-slate-200'}`}>
                               <div className="px-4 py-2 bg-slate-50 border-b flex justify-between items-center text-sm">
                                  <span className="font-bold">第 {group.id} 組</span>
                                  <span className="text-slate-400 text-xs">均: {group.stats.avg}</span>
                               </div>
                               <div className="p-3 grid grid-cols-2 gap-2">
                                  {group.members.map(m => (
                                     <div key={m.id} className="relative p-2 border rounded bg-white flex flex-col items-center">
                                        {/* 如果該學生被指定在此組，顯示圖示 */}
                                        {constraints.some(c => c.type === 'assign' && c.s1 === m.id) && (
                                           <Icon name="MapPin" className="absolute top-1 left-1 w-3 h-3 text-purple-400"/>
                                        )}
                                        <span className="text-xs text-slate-400">#{m.score}</span>
                                        <span className={`font-bold ${m.gender==='M'?'text-blue-600':'text-pink-600'}`}>{m.name}</span>
                                     </div>
                                  ))}
                                  {Array.from({length: Math.max(0, 4-group.members.length)}).map((_,i)=>(
                                     <div key={i} className="p-2 border border-dashed rounded flex items-center justify-center text-xs text-slate-300">空</div>
                                  ))}
                               </div>
                            </div>
                         ))}
                      </div>
                   </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SeatingPlanner />);
    </script>
</body>
</html>
